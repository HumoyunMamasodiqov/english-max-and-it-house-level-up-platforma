{% extends 'groups/base.html' %}

{% block title %}Foydalanuvchini tahrirlash{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50">
    <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="mb-8">
            <a href="{% url 'student_list' %}" class="text-sm text-gray-500 hover:text-gray-700 inline-flex items-center mb-4">
                <i class="fas fa-arrow-left mr-2"></i> Orqaga
            </a>
            <div class="flex items-center">
                <div class="w-10 h-10 bg-gray-900 rounded-lg flex items-center justify-center">
                    <i class="fas fa-user-edit text-white text-lg"></i>
                </div>
                <div class="ml-4">
                    <h1 class="text-2xl font-semibold text-gray-900">Foydalanuvchini tahrirlash</h1>
                    <p class="text-sm text-gray-500 mt-1">{{ student.full_name }}</p>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-lg border border-gray-200 shadow-sm">
            <form method="post" class="p-6">
                {% csrf_token %}
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Ism</label>
                        <input type="text" name="first_name" value="{{ student.user.first_name }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-gray-400">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Familiya</label>
                        <input type="text" name="last_name" value="{{ student.user.last_name }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-gray-400">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
                        <input type="text" name="username" value="{{ student.user.username }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-gray-400">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Guruh</label>
                        <select name="group" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-gray-400">
                            <option value="">-- Guruh tanlang --</option>
                            {% for group in groups %}
                                <option value="{{ group.id }}" {% if student.group and student.group.id == group.id %}selected{% endif %}>
                                    {{ group.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Telefon</label>
                        <input type="text" name="phone" value="{{ student.phone|default:'' }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-gray-400">
                    </div>
                </div>
                
                <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-gray-100">
                    <a href="{% url 'student_list' %}" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 transition">
                        Bekor qilish
                    </a>
                    <button type="submit" class="bg-gray-900 hover:bg-gray-800 text-white text-sm font-medium px-6 py-2 rounded-lg transition">
                        <i class="fas fa-save mr-2"></i> Saqlash
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
