{% extends 'groups/base.html' %}

{% block title %}Bosh sahifa{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-2xl w-full text-center">
        <!-- Logo/Icon -->
        <div class="inline-flex items-center justify-center w-20 h-20 bg-gray-900 rounded-2xl mb-6 shadow-sm">
            <i class="fas fa-graduation-cap text-white text-3xl"></i>
            
        </div>
        
        <!-- Title -->
        <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-4">
            IT House Academy
        </h1>
        
        <!-- Description -->
        <p class="text-lg text-gray-500 mb-8 max-w-md mx-auto">
            Level up platformasi
        </p>
        
        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{% url 'login' %}" class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-lg text-white bg-gray-900 hover:bg-gray-800 transition duration-200">
                <i class="fas fa-sign-in-alt mr-2"></i>
                Kirish
            </a>
            <a href="{% url 'register' %}" class="inline-flex items-center justify-center px-6 py-3 border border-gray-300 text-base font-medium rounded-lg text-gray-700 bg-white hover:bg-gray-50 transition duration-200">
                <i class="fas fa-user-plus mr-2"></i>
                Ro'yxatdan o'tish
            </a>
        </div>
        
        <!-- Footer -->
        <div class="mt-12 pt-6 border-t border-gray-200">
            <p class="text-xs text-gray-400">
                © 2026 IT House Academy Level up . Barcha huquqlar himoyalangan.
            </p>
        </div>
    </div>
</div>
{% endblock %}
