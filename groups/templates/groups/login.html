{% extends 'groups/base.html' %}

{% block title %}Kirish{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full">
        <!-- Logo/Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-gray-900 rounded-lg mb-4">
                <i class="fas fa-graduation-cap text-white text-xl"></i>
            </div>
            <h2 class="text-2xl font-semibold text-gray-900">Tizimga kirish</h2>
            <p class="text-gray-500 text-sm mt-1">Hisobingizga kiring</p>
        </div>
        
        <!-- Login Form -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    {{ form.username }}
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Parol</label>
                    {{ form.password }}
                </div>
                
                <button type="submit" class="w-full bg-gray-900 hover:bg-gray-800 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200">
                    Kirish
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-500">
                    Hisobingiz yo'qmi? 
                    <a href="{% url 'register' %}" class="text-gray-900 hover:text-gray-700 font-medium">Ro'yxatdan o'tish</a>
                </p>
            </div>
        </div>
    </div>
</div>

<style>
    input {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        transition: all 0.2s;
    }
    input:focus {
        outline: none;
        border-color: #94a3b8;
        ring: 2px solid #94a3b8;
    }
</style>
{% endblock %}
